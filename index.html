<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EvoAxis - Data Entry System</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<!-- ========================= -->
<!-- Splash Screen -->
<!-- ========================= -->

<div id="splash">

    <div class="ai-core">

        <div class="ring ring1"></div>

        <div class="ring ring2"></div>

        <div class="core"></div>

    </div>

    <h1 class="app-title">

        EvoAxis

    </h1>

    <p class="app-subtitle">

        Maintenance Data System

    </p>

    <div class="loader">

        <div class="progress"></div>

    </div>

</div>

<!-- ========================= -->
<!-- HOME -->
<!-- ========================= -->

<div id="home">

<header>

    <div class="logo-section">

        <div>

            <h2>EvoAxis</h2>

            <p>DATA ENTRY SYSTEM</p>

        </div>

    </div>

    <div class="nav-buttons">

        <button
            class="records-btn"
            onclick="window.location.href='records.html'">

            📋 Records

        </button>

        <button
            class="dashboard-btn"
            onclick="window.location.href='dashboard.html'">

            📊 Dashboard

        </button>

    </div>

</header>

<main>

<section class="hero">

<div class="hero-left">

<span>

EVOAXIS DATA ENTRY

</span>

<h1>

Choose a Machine

</h1>

<p>

Click any machine to open the
breakdown report form.

</p>

</div>

<div class="hero-right">

<div class="machine-count">

<h1 id="machineCount">

0

</h1>

<p>

Total Machines

</p>

</div>

<button
id="downloadExcel"
class="excel-btn">

⬇ Download Excel

</button>

</div>

</section>

<section class="search-section">

<input

type="text"

id="searchInput"

placeholder="Search by machine name or equipment number..."

>

</section>

<section

class="machine-grid"

id="machineGrid"

>

</section>

</main>

</div>

<script src="js/config.js"></script>

<script src="js/machines.js"></script>

<script src="js/app.js"></script>

<script src="js/splash.js"></script>

</body>

</html>
