<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>EvoAxis | Breakdown Records</title>

    <link rel="stylesheet" href="css/records.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<!-- ===========================
     Header
=========================== -->

<header>

    <button
        class="back-btn"
        onclick="window.location.href='index.html'">

        ←

    </button>

    <div>

        <h2>EvoAxis</h2>

        <p>Breakdown Records</p>

    </div>

</header>

<!-- ===========================
     Main
=========================== -->

<main>

    <!-- Page Title -->

    <section class="page-title">

        <div>

            <h1>Breakdown History</h1>

            <p>

                All submitted maintenance records

            </p>

        </div>

        <div class="record-count">

            <h2 id="recordCount">

                0

            </h2>

            <span>

                Records

            </span>

        </div>

    </section>

    <!-- Search -->

    <section class="search-section">

        <input
            type="text"
            id="searchInput"
            placeholder="Search Machine / Operator / Breakdown ID">

    </section>

    <!-- Records Table -->

    <section class="table-container">

        <table id="recordsTable">

            <thead>

                <tr>

                    <th>Breakdown ID</th>

                    <th>Machine ID</th>

                    <th>Machine Name</th>

                    <th>Operator</th>

                    <th>Attended By</th>

                    <th>Downtime</th>

                    <th>Problem</th>

                    <th>Corrective Action</th>

                    <th>Root Cause</th>

                    <th>Timestamp</th>

                </tr>

            </thead>

            <tbody id="recordsBody">

                <!-- records.js will populate rows -->

            </tbody>

        </table>

    </section>

</main>

<script src="js/config.js"></script>
<script src="js/records.js"></script>

</body>

</html>
